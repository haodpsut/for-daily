name: dynaqgnn
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # --- Core deep learning (GPU) ---
  - pytorch=2.3.*
  - torchvision
  - pytorch-cuda=12.1
  # --- Scientific stack ---
  - numpy=1.26.*
  - scipy=1.13.*
  - scikit-learn=1.5.*
  - pandas=2.2.*
  - matplotlib=3.9.*
  - seaborn=0.13.*
  # --- Graph learning ---
  - pyg::pytorch-geometric
  # --- Optimization (classical baseline) ---
  - cvxpy=1.5.*
  # --- Dev tooling ---
  - pytest
  - black
  - ruff
  - pre-commit
  # --- Pip-only deps (quantum stack) ---
  - pip:
      - pennylane==0.36.*
      - pennylane-lightning==0.36.*
      - pennylane-lightning-gpu==0.36.*   # cuQuantum backend (needs CUDA 12.x)
      - qiskit==1.1.*
      - qiskit-aer==0.14.*
      - qiskit-ibm-runtime==0.24.*
      - wandb==0.17.*
      - hydra-core==1.3.*
      - omegaconf==2.3.*
      - rich==13.*
      - tqdm
